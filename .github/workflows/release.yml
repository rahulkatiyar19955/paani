name: Build & Publish to Play Store

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

# Prevent concurrent releases from stepping on each other
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for git push & GitHub Release

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for tagging
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Determine bump type ───────────────────────────────────
      - name: Determine bump type
        id: bump_type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump=${{ github.event.inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            # Default to patch for push-triggered builds
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      # ── Bump version.properties ───────────────────────────────
      - name: Read & bump version
        id: version
        run: |
          # Read current version
          source version.properties

          BUMP="${{ steps.bump_type.outputs.bump }}"

          case "$BUMP" in
            major)
              VERSION_MAJOR=$((VERSION_MAJOR + 1))
              VERSION_MINOR=0
              VERSION_PATCH=0
              ;;
            minor)
              VERSION_MINOR=$((VERSION_MINOR + 1))
              VERSION_PATCH=0
              ;;
            patch)
              VERSION_PATCH=$((VERSION_PATCH + 1))
              ;;
          esac

          VERSION_NAME="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          VERSION_CODE=$((VERSION_MAJOR * 10000 + VERSION_MINOR * 100 + VERSION_PATCH))

          # Write back
          cat > version.properties << EOF
          VERSION_MAJOR=${VERSION_MAJOR}
          VERSION_MINOR=${VERSION_MINOR}
          VERSION_PATCH=${VERSION_PATCH}
          EOF
          # Strip leading whitespace that heredoc may introduce
          sed -i 's/^[[:space:]]*//' version.properties

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

          echo "📦 Version: ${VERSION_NAME} (code ${VERSION_CODE})"

      # ── Set up JDK ────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Generate Gradle Wrapper if missing ───────────────────
      - name: Generate Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.11.1
          fi
          chmod +x gradlew

      # ── Gradle cache ──────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # ── Decode signing keystore ───────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ github.workspace }}/release-keystore.jks

      # ── Build release AAB ─────────────────────────────────────
      - name: Build release bundle
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── Upload to Google Play (internal track) ────────────────
      - name: Publish to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.aistudio.waterreminder.xblqzw
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          releaseName: v${{ steps.version.outputs.version_name }}

      # ── Commit version bump & tag ─────────────────────────────
      - name: Commit version bump & create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add version.properties
          if git status --porcelain | grep -q "gradlew"; then
            git add gradlew gradlew.bat gradle/wrapper/
          fi
          git commit -m "chore: bump version to v${{ steps.version.outputs.version_name }} & ensure wrapper" || echo "No changes to commit"
          git tag "v${{ steps.version.outputs.version_name }}"

          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version_name }}"

      # ── Create GitHub Release ─────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: v${{ steps.version.outputs.version_name }}
          body: |
            ## Paani v${{ steps.version.outputs.version_name }}

            **Version Code:** ${{ steps.version.outputs.version_code }}
            **Track:** internal
            **Bump type:** ${{ steps.bump_type.outputs.bump }}
          files: app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true

      # ── Clean up keystore ─────────────────────────────────────
      - name: Clean up keystore
        if: always()
        run: rm -f ${{ github.workspace }}/release-keystore.jks
